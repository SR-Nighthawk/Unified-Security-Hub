# ═══════════════════════════════════════════════════════════════
# Unified Security Hub — Docker Compose
# ═══════════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f app    # Follow app logs
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop + remove volumes (DATA LOSS)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Flask Application ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sechub-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override Tor proxy to point to tor container
      - TOR_PROXY_HOST=tor
      - TOR_PROXY_PORT=9050
      # ZAP API mode (connect to zap container)
      - ZAP_API_URL=http://zap:8080
    volumes:
      # Persistent data mounts
      - sechub-db:/app/database
      - sechub-reports:/app/backend/reports
      - sechub-sessions:/app/backend/sessions
      - sechub-data:/app/data
      - sechub-static:/app/static
      - sechub-frontend-static:/app/frontend/static/reports
    depends_on:
      tor:
        condition: service_started
    networks:
      - sechub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sechub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment below for HTTPS (requires SSL certs)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount static files for direct serving by Nginx
      - sechub-static:/app/static:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - sechub-net

  # ── Tor SOCKS5 Proxy ─────────────────────────────────────
  # Provides Tor connectivity for dark web intelligence module
  tor:
    image: dperson/torproxy:latest
    container_name: sechub-tor
    restart: unless-stopped
    environment:
      - TOR_NewCircuitPeriod=60
      - TOR_MaxCircuitDirtiness=600
    networks:
      - sechub-net
    # No ports exposed externally — only accessible within Docker network

  # ── OWASP ZAP (API Mode) ─────────────────────────────────
  # Headless ZAP scanner accessible via REST API
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: sechub-zap
    restart: unless-stopped
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    networks:
      - sechub-net
    # No ports exposed externally — only accessible within Docker network

# ── Named Volumes ────────────────────────────────────────────
# Data persists across container restarts / rebuilds
volumes:
  sechub-db:
    driver: local
  sechub-reports:
    driver: local
  sechub-sessions:
    driver: local
  sechub-data:
    driver: local
  sechub-static:
    driver: local
  sechub-frontend-static:
    driver: local

# ── Network ──────────────────────────────────────────────────
networks:
  sechub-net:
    driver: bridge
