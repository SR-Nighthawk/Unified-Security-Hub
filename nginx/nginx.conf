# ═══════════════════════════════════════════════════════════════
# Nginx Reverse Proxy for Unified Security Hub
# ═══════════════════════════════════════════════════════════════

upstream sechub_app {
    server app:5000;
}

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request Size (16MB for file uploads) ──────────────────
    client_max_body_size 16m;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Static Files (served directly by Nginx) ───────────────
    location /static/ {
        alias /app/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proof screenshots from dark web module
    location /static/proof_ {
        alias /app/static/;
        expires 1d;
        access_log off;
    }

    # ── WebSocket Support (Flask-SocketIO) ────────────────────
    location /socket.io/ {
        proxy_pass http://sechub_app/socket.io/;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 7s;

        # Disable buffering for real-time events
        proxy_buffering off;
    }

    # ── Server-Sent Events (AI Chat streaming) ────────────────
    location /api/chat {
        proxy_pass http://sechub_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE requires no buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Main Application ──────────────────────────────────────
    location / {
        proxy_pass http://sechub_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for scan operations (Nmap, ZAP can run 10+ min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}
