{% extends "layout.html" %}
{% block title %}Groups — Ransomware Intel{% endblock %}
{% block content %}
<div class="page-container">
    <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px;">
        <div>
            <div style="font-size:12px; color:var(--accent2); letter-spacing:0.1em; text-transform:uppercase; font-weight:600; margin-bottom:8px;">Live Tracking</div>
            <h2 class="page-title"><i class="fas fa-users" style="color:var(--text3); margin-right:8px;"></i> Ransomware Groups Index</h2>
        </div>
        <a href="/ransomware" class="btn-sm"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <!-- Active Groups Listing -->
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr><th>Threat Actor Group</th><th>Assessed Threat</th><th>Victims Logged</th><th>First Active Sign</th><th>Last Disclosure</th><th>Status</th></tr>
            </thead>
            <tbody id="groups-body">
                <tr><td colspan="6" style="text-align:center; padding:48px; color:var(--text3);">Loading group metrics...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- THREAT GROUP DOSSIER MODAL -->
<div id="groupModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(4px);">
    <div style="background:var(--bg); border:1px solid var(--border2); border-radius:12px; width:100%; max-width:900px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 48px rgba(0,0,0,0.5);">
        
        <!-- Header -->
        <div style="padding:16px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg2);">
            <div>
                <h3 style="margin:0; font-size:22px; font-weight:600; display:flex; align-items:center; gap:8px;" id="m-name"></h3>
            </div>
            <button onclick="closeModal()" style="background:transparent; border:none; color:var(--text3); font-size:20px; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>

        <!-- Body -->
        <div style="padding:24px; overflow-y:auto; flex:1;" id="m-body">
            <div style="text-align:center; padding:48px; color:var(--text3);"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        </div>
    </div>
</div>

<script>
let groupsCache = {}; // Global cache for current page list interactions

async function loadGroups() {
    try {
        const res = await fetch('/api/ransomware/groups');
        const data = await res.json();

        const tbody = document.getElementById('groups-body');
        if (data && data.length > 0) {
            groupsCache = {};
            tbody.innerHTML = data.map(g => {
                groupsCache[g.slug] = g;
                const threatClass = g.threat_level === 'CRITICAL' ? 'chip-r' : (g.threat_level === 'HIGH' ? 'chip-a' : 'chip-b');
                const statusClass = g.status === 'active' ? 'chip-g' : 'chip';
                return `
                <tr style="transition:background 0.2s; cursor:pointer;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''" onclick="showGroupDetails('${g.slug}')">
                    <td style="font-weight:600; font-size:14px; display:flex; align-items:center; gap:8px;"><div style="width:8px;height:8px;border-radius:2px;background:var(--${g.status === 'active' ? 'green' : 'border2'});"></div> ${g.name}</td>
                    <td><span class="chip ${threatClass}">${g.threat_level || 'MEDIUM'}</span></td>
                    <td style="font-family:var(--mono); font-size:14px; font-weight:600; color:var(--accent2);">${(g.victim_count || 0).toLocaleString()}</td>
                    <td style="color:var(--text2); font-family:var(--mono); font-size:11px;">${g.first_seen || '—'}</td>
                    <td style="color:var(--text2); font-family:var(--mono); font-size:11px;">${g.last_seen || '—'}</td>
                    <td><span class="chip ${statusClass}">${g.status ? g.status.toUpperCase() : 'INACTIVE'}</span></td>
                </tr>`;
            }).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:64px 0; color:var(--text2);">
                <div style="font-size:32px; color:var(--border2); margin-bottom:16px;"><i class="fas fa-users-slash"></i></div>
                No active ransomware groups logged in database.
            </td></tr>`;
        }
    } catch(e) {
        document.getElementById('groups-body').innerHTML = `<tr><td colspan="6" style="text-align:center; padding:32px; color:var(--red);">Failed to connect to backend endpoint.</td></tr>`;
    }
}

async function showGroupDetails(slug) {
    const parent = groupsCache[slug] || { name: slug };
    document.getElementById('m-name').innerHTML = `<i class="fas fa-user-secret" style="color:var(--accent2); font-size:18px;"></i> ${parent.name} - Intelligence Dossier`;
    
    document.getElementById('m-body').innerHTML = `<div style="text-align:center; padding:48px; color:var(--text3);"><i class="fas fa-spinner fa-spin fa-2x"></i><div style="margin-top:12px;">Pulling active telemetry...</div></div>`;
    document.getElementById('groupModal').style.display = 'flex';

    try {
        const res = await fetch(`/api/ransomware/group/${slug}`);
        const data = await res.json();
        
        if (data && Object.keys(data).length > 0 && !data.error) {
            
            // Build Sites list
            let linksHTML = '';
            if (data.locations && data.locations.length > 0) {
                linksHTML = data.locations.map(site => {
                    const status = site.available ? '<span class="chip chip-g" style="padding:2px 4px;">ONLINE</span>' : '<span class="chip chip-r" style="padding:2px 4px;">OFFLINE</span>';
                    const fqdn = site.fqdn.length > 30 ? site.fqdn.substring(0, 30) + '...' : site.fqdn;
                    return `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface); padding:8px 12px; border-radius:6px; margin-bottom:8px; border:1px solid var(--border);">
                        <div>
                            <div style="font-size:11px; margin-bottom:4px;"><span class="chip" style="background:var(--border);">${site.type || 'Onion'}</span> ${status}</div>
                            <div style="font-family:var(--mono); color:var(--text); font-size:13px;" title="${site.fqdn}">${fqdn}</div>
                        </div>
                        <a href="http://${site.fqdn}" target="_blank" class="btn-sm" style="font-size:11px;">Visit Node <i class="fas fa-external-link-alt" style="margin-left:4px;"></i></a>
                    </div>`;
                }).join('');
            } else {
                linksHTML = `<div style="color:var(--text3); font-size:12px; padding:12px 0;">No darkweb infrastructure publicly logged.</div>`;
            }

            // Build targets tags
            let sectorsHTML = '';
            const targs = (data.profile && Array.isArray(data.profile)) ? data.profile[0] : (data.profile || {});
            if(targs.targets && targs.targets.length > 0) {
                sectorsHTML = `<div style="display:flex; flex-wrap:wrap; gap:6px;">` + targs.targets.map(t => `<span class="chip chip-b">${t}</span>`).join('') + `</div>`;
            } else {
                sectorsHTML = '<div style="color:var(--text3); font-size:12px;">Unknown specific targeting matrix.</div>';
            }

            document.getElementById('m-body').innerHTML = `
            <div style="display:flex; gap:24px;">
                <!-- Left column -->
                <div style="flex:1;">
                    <div style="font-size:12px; color:var(--text3); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em;">CTI Description</div>
                    <div style="font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:24px; max-height:200px; overflow-y:auto; padding-right:12px;">${data.description || 'No detailed background currently retained by the intel engines.'}</div>
                    
                    <div style="font-size:12px; color:var(--text3); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em;">Known Targets & Industries</div>
                    <div style="margin-bottom:24px;">${sectorsHTML}</div>

                    <div style="font-size:12px; color:var(--text3); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em;">Initial Sightings & Channels</div>
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <span class="chip" style="background:var(--border);">First Logged: ${data.meta?.first_seen || 'Unknown'}</span>
                        ${data.meta?.telegram ? `<a href="${data.meta.telegram[0]}" target="_blank" class="chip chip-b" style="text-decoration:none;"><i class="fab fa-telegram"></i> Actor Feed</a>` : ''}
                        ${data.meta?.tox ? `<span class="chip chip-a" title="${data.meta.tox[0]}">TOX ID Retained</span>` : ''}
                    </div>
                </div>

                <!-- Right Column (Nodes) -->
                <div style="width:350px; border-left:1px solid var(--border); padding-left:24px;">
                    <div style="font-size:12px; color:var(--text3); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.05em;">Infrastructure & Nodes</div>
                    <div style="max-height:400px; overflow-y:auto; padding-right:8px;">
                        ${linksHTML}
                    </div>
                </div>
            </div>`;
        } else {
            document.getElementById('m-body').innerHTML = `<div style="text-align:center; padding:48px; color:var(--text2);">Intelligence Dossier not currently available for this entity.</div>`;
        }
    } catch(e) {
        document.getElementById('m-body').innerHTML = `<div style="text-align:center; padding:48px; color:var(--red);">Failed to pull Threat Actor graph. Payload dropped.</div>`;
    }
}

function closeModal() {
    document.getElementById('groupModal').style.display = 'none';
}

loadGroups();
</script>
{% endblock %}
