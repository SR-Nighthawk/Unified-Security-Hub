{% extends "layout.html" %}
{% block title %}Authentication | SecHub{% endblock %}

{% block content %}
<div class="reveal" style="display:flex; justify-content:center; align-items:center; min-height:60vh;">
    <div class="panel" style="width:100%; max-width:400px; padding:32px;">
        <!-- Tabs -->
        <div style="display:flex; border-bottom: 1px solid var(--border); margin-bottom: 24px;">
            <div id="tabLogin" style="flex:1; text-align:center; padding-bottom:12px; font-weight:600; cursor:pointer; color:var(--accent1); border-bottom: 2px solid var(--accent1);" onclick="switchTab('login')">Sign In</div>
            <div id="tabRegister" style="flex:1; text-align:center; padding-bottom:12px; font-weight:600; cursor:pointer; color:var(--text3); border-bottom: 2px solid transparent;" onclick="switchTab('register')">Register</div>
        </div>

        <div id="alertBox" style="display:none; padding:12px; background:rgba(220,38,38,0.1); color:var(--red); border-radius:var(--radius-sm); font-size:12px; margin-bottom:16px;"></div>

        <!-- Login Form -->
        <div id="formLogin">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="loginEmail" class="form-input" placeholder="admin@sechub.local" />
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" />
            </div>
            <button class="btn-lg" style="width:100%; justify-content:center;" onclick="submitLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
        </div>

        <!-- Register Form -->
        <div id="formRegister" style="display:none;">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="regUsername" class="form-input" placeholder="admin" />
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="regEmail" class="form-input" placeholder="admin@sechub.local" />
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label class="form-label">Password</label>
                <input type="password" id="regPassword" class="form-input" placeholder="••••••••" />
            </div>
            <button class="btn-lg" style="width:100%; justify-content:center;" onclick="submitRegister()"><i class="fas fa-user-plus"></i> Create Account</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(mode) {
        document.getElementById('alertBox').style.display = 'none';
        if (mode === 'login') {
            document.getElementById('formLogin').style.display = 'block';
            document.getElementById('formRegister').style.display = 'none';
            document.getElementById('tabLogin').style.color = 'var(--accent1)';
            document.getElementById('tabLogin').style.borderBottomColor = 'var(--accent1)';
            document.getElementById('tabRegister').style.color = 'var(--text3)';
            document.getElementById('tabRegister').style.borderBottomColor = 'transparent';
        } else {
            document.getElementById('formRegister').style.display = 'block';
            document.getElementById('formLogin').style.display = 'none';
            document.getElementById('tabRegister').style.color = 'var(--accent1)';
            document.getElementById('tabRegister').style.borderBottomColor = 'var(--accent1)';
            document.getElementById('tabLogin').style.color = 'var(--text3)';
            document.getElementById('tabLogin').style.borderBottomColor = 'transparent';
        }
    }

    async function submitLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const box = document.getElementById('alertBox');
        
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                box.innerText = data.error;
                box.style.display = 'block';
            }
        } catch(e) { console.error(e); }
    }

    async function submitRegister() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const box = document.getElementById('alertBox');

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                box.innerText = data.error;
                box.style.display = 'block';
            }
        } catch(e) { console.error(e); }
    }
</script>
{% endblock %}
